<!DOCTYPE html>
<html>
    <head>
        <title>Coffee shop website</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="Coffee-Logo.png">
    </head>

    <body>

        <!-- Navbar -->
        <header>
            <div class="logo">☕ LOGO</div>
            <nav>
                <li><a href="#">Home</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </nav>
            <button class="Order-btn">Order Now</button>
        </header>

        <!-- Hero section -->
         <section class="hero">

            <div class="hero-content">
                <h1>Start Your Day</h1>
                <h2>with <span>Great Coffee</span></h2>
                <p>Crafted with care to brighten your day.</p>

                <div class="buttons">
                    <button class="btn light">View Menu</button>
                    <button class="btn dark">Order Now</button>
                </div>
            </div>
         </section>
        
    </body>
</html>
